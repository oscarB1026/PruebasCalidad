version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: logitrack-postgres
    environment:
      POSTGRES_DB: logitrack
      POSTGRES_USER: logitrack_user
      POSTGRES_PASSWORD: logitrack_pass
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256  # Forzar autenticación con password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - logitrack-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logitrack_user -d logitrack"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: logitrack-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - logitrack-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: logitrack-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_HOST://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_HOST
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    networks:
      - logitrack-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: logitrack-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - logitrack-network

  sonarqube:
    image: sonarqube:lts-community
    container_name: logitrack-sonarqube
    ports:
      - "9000:9000"
    environment:
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    networks:
      - logitrack-network

volumes:
  postgres_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:

networks:
  logitrack-network:
    driver: bridge